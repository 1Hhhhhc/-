<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智慧商品管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部导航 - 改为红色系 */
        .top-header {
            background: linear-gradient(135deg, #8b0000 0%, #cc0000 100%);
            color: white;
            padding: 0 28px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 100;
        }
        .top-header .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 600;
        }
        .top-header .logo .ak-icon {
            display: flex;
            align-items: center;
            font-size: 28px;
        }
        .top-header .logo .ak-icon .gun1 {
            transform: rotate(-45deg);
            margin-right: -8px;
        }
        .top-header .logo .ak-icon .gun2 {
            transform: rotate(135deg);
            margin-left: -8px;
        }
        .top-header .logo i {
            color: #ffd700; /* 金色点缀 */
        }
        .top-header .user-info {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 14px;
        }
        .top-header .user-info i {
            font-size: 18px;
            color: #ffd700;
        }
        .top-header .user-info .logout-btn {
            color: #ffcccc;
            cursor: pointer;
            text-decoration: none;
        }
        .top-header .user-info .logout-btn:hover {
            color: #ffffff;
        }

        /* 主体 */
        .main-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧导航 */
        .sidebar {
            width: 230px;
            background: #ffffff;
            border-right: 1px solid #e8ecf1;
            padding: 16px 0;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .sidebar .menu-label {
            font-size: 12px;
            color: #8c9aa8;
            padding: 8px 24px 6px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .sidebar .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 24px;
            color: #3d4a5b;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .sidebar .menu-item i {
            width: 20px;
            font-size: 16px;
            color: #6b7a8d;
        }
        .sidebar .menu-item:hover {
            background: #fff0f0;
            color: #8b0000;
            border-left-color: #cc0000;
        }
        .sidebar .menu-item:hover i {
            color: #cc0000;
        }
        .sidebar .menu-item.active {
            background: #fce4e4;
            color: #8b0000;
            border-left-color: #cc0000;   /* 红色边框 */
            font-weight: 600;
        }
        .sidebar .menu-item.active i {
            color: #cc0000;
        }

        /* 右侧内容区 */
        .content-area {
            flex: 1;
            padding: 20px 24px 24px 24px;
            background: #f0f2f5;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .content-area .iframe-wrapper {
            flex: 1;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .content-area .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 64px;
            }
            .sidebar .menu-item span {
                display: none;
            }
            .sidebar .menu-item {
                justify-content: center;
                padding: 14px 0;
            }
            .sidebar .menu-item i {
                font-size: 20px;
                margin: 0;
            }
            .sidebar .menu-label {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 顶部导航 -->
    <header class="top-header">
        <div class="logo">
            <span class="ak-icon">
                <i class="fas fa-gun gun1"></i>
                <i class="fas fa-gun gun2"></i>
            </span>
            <span>智慧商品管理系统</span>
        </div>
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <span id="currentUsername">管理员</span>
            <span style="color:#ffd700;">|</span>
            <a href="/logout" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> 退出
            </a>
        </div>
    </header>

    <div class="main-body">
        <!-- 左侧导航 -->
        <nav class="sidebar">
            <div class="menu-label">导航菜单</div>
            <a class="menu-item active" onclick="loadPage('welcome', this)">
                <i class="fas fa-home"></i>
                <span>欢迎首页</span>
            </a>
            <a class="menu-item" onclick="loadPage('product', this)">
                <i class="fas fa-boxes"></i>
                <span>武器管理</span>
            </a>
            <a class="menu-item admin-menu" onclick="loadPage('category', this)">
                <i class="fas fa-tags"></i>
                <span>分类管理</span>
            </a>
        </nav>

        <!-- 右侧内容区 -->
        <div class="content-area">
            <div class="iframe-wrapper">
                <iframe id="mainIframe" src="/welcome" name="mainFrame"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    function loadPage(page, el) {
        const iframe = document.getElementById('mainIframe');
        const map = {
            'welcome': '/welcome',
            'product': '/product/list',
            'category': '/category/list'
        };
        iframe.src = map[page] || '/welcome';
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        if (el) el.classList.add('active');
    }
    document.getElementById('currentUsername').textContent = '管理员';
</script>

</body>
</html>
